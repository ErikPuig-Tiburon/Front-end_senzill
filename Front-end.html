<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Front end senzill</title>
</head>

<body>

	<h2>GET Tots els estudiants</h2>
	<button onclick="buscarTOTSestudians()">Buscar a TOTs els estudians</button>
	<pre id="buscarTOTSestudians"></pre>

	<hr>

	<h2>GET Un estudiant</h2>
	<input type="text" id="UNestudiant" placeholder="Fica un ID asi to largo plis">
	<button onclick="UNestudiant()">Buscar estudiant individual per ID</button>
	<pre id="UNestudiant"></pre>

	<script>
		const lestras_i_numeritos_pa_coger_cosas = "http://localhost:8000/students";
		// GET tots
		async function buscarTOTSestudians() {
			const res = await fetch(lestras_i_numeritos_pa_coger_cosas + "/");
			const data = await res.json();
			document.getElementById("buscarTOTSestudians").textContent = JSON.stringify(data, null, 2);
		}

		// GET un
		async function UNestudiant() {
			const id = document.getElementById("UNestudiant").value;
			const res = await fetch(lestras_i_numeritos_pa_coger_cosas + "/" + id);

			if (!res.ok) {
				document.getElementById("resultado").textContent = "Error: " + res.status;
				return;
			}

			const data = await res.json();
			document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
		}

	</script>

</body>

</html>
